name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * *" # KST 02:30 daily

jobs:
  build-and-test:
    if: github.event_name != 'schedule'
    runs-on: macos-14
    name: macOS-arm64

    # Note: Linux + Windows builds compile fine but a handful of tests
    # exercise platform-sensitive floating-point edge cases (NaN handling,
    # exact spectral bin levels in the heater-hum test).  Those will be
    # tightened in a follow-up; for now CI gates the primary release
    # platform (macOS, where Logic / Reaper / Ableton users live).

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (DSP + tests only for CI)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=OFF
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

  # Cross-platform DSP gates (docs/35 D4).  Non-blocking for now
  # (continue-on-error): the suites are being hardened against platform
  # floating-point edge cases — flip to blocking once two consecutive
  # green runs exist per OS.
  cross-platform-dsp:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: DSP ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (DSP + tests only)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=OFF
          -DVALVRA_BUILD_CLI=OFF
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

  # Full plugin build + the complete 200+ test suite (including the
  # plugin stress tests that caught the feedthrough limit-cycle, the
  # flux-loop instability and the carry-over steps — docs/35 §A2: the
  # DSP-only job above gates barely 80% of the suite).
  plugin-tests:
    if: github.event_name != 'schedule'
    runs-on: macos-14
    name: macOS Plugin Suite
    # First run 29630195878 died at timeout-minutes 60 with the BUILD step
    # still compiling: a cold JUCE plugin build on the 3-core runner alone
    # eats the hour, and a cancelled job skips the cache post-step, so
    # every retry stayed cold.  Budget must cover a full cold build+suite
    # WITH margin — the first successful cold run measured 103 min, and a
    # timeout on a cold run never seeds the cache (post-step skipped), so
    # an undersized budget is a permanent-cold loop, not one slow run.
    # ccache (below) brings warm runs down to a fraction of this.
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@v4

      # The expensive part is COMPILING JUCE/chowdsp, not cloning them
      # (configure incl. fetch is ~1 min).  ccache keyed per-commit with a
      # prefix restore-key always starts from the newest prior cache and
      # always saves a fresh one on success.
      - name: Install ccache
        run: brew install ccache

      - name: Cache compiler cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-plugin-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-plugin-${{ runner.os }}-

      - name: Cache fetched dependencies (JUCE, chowdsp)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure CMake (plugin + full test suite)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=ON
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      # The plugin_stress label is ~31 CPU-minutes of serial render time;
      # spread it across the runner's cores.  Tests are deterministic DSP
      # asserts (no wall-clock assertions), so parallel execution is safe.
      - name: Run full test suite
        working-directory: build
        run: ctest --output-on-failure -C Release --parallel 3

  fit-pipeline-smoke:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-14
    name: Fit Pipeline Smoke
    # The physics-solver engine lengthened the 5-mode refit render to
    # ~25 min on an 8-core arm64; CI runners have fewer cores, so the
    # job budget must comfortably exceed the in-tree ctest TIMEOUT 3600.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # The fit pipeline is numpy-based (scipy optional but preferred for
      # the least-squares stage).  The runner's python ships without them —
      # this job failed every night on `ModuleNotFoundError: numpy` until
      # this step existed (docs/35 §A1).
      - name: Install Python deps (fit pipeline)
        run: >
          python3 -m pip install --break-system-packages numpy scipy
          || python3 -m pip install --user numpy scipy

      - name: Configure CMake (CLI + fit pipeline test)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=OFF
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run fit pipeline smoke
        working-directory: build
        run: ctest --output-on-failure -C Release -L fit_pipeline

      - name: Upload fit pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fit-pipeline-artifacts
          path: |
            build/artifacts/external_refit_pipeline_summary_ctest.json
            build/artifacts/fit_verify_summary_ctest.json
            docs/32-practical-readiness-2026-05-15.md
