name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * *" # KST 02:30 daily

jobs:
  build-and-test:
    if: github.event_name != 'schedule'
    runs-on: macos-14
    name: macOS-arm64

    # Note: Linux + Windows builds compile fine but a handful of tests
    # exercise platform-sensitive floating-point edge cases (NaN handling,
    # exact spectral bin levels in the heater-hum test).  Those will be
    # tightened in a follow-up; for now CI gates the primary release
    # platform (macOS, where Logic / Reaper / Ableton users live).

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (DSP + tests only for CI)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=OFF
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

  fit-pipeline-smoke:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-14
    name: Fit Pipeline Smoke
    # The physics-solver engine lengthened the 5-mode refit render to
    # ~25 min on an 8-core arm64; CI runners have fewer cores, so the
    # job budget must comfortably exceed the in-tree ctest TIMEOUT 3600.
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (CLI + fit pipeline test)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DVALVRA_BUILD_TESTS=ON
          -DVALVRA_BUILD_PLUGIN=OFF
          -DVALVRA_ENABLE_FIT_PIPELINE_TEST=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run fit pipeline smoke
        working-directory: build
        run: ctest --output-on-failure -C Release -L fit_pipeline

      - name: Upload fit pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fit-pipeline-artifacts
          path: |
            build/artifacts/external_refit_pipeline_summary_ctest.json
            build/artifacts/fit_verify_summary_ctest.json
            docs/32-practical-readiness-2026-05-15.md
